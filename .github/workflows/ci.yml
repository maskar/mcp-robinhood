name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --extra dev

      - name: Lint Python
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q

      - name: Import smoke
        run: uv run python -c "import mcp_robinhood.server.app; print('import ok')"

      - name: Compile Python modules
        run: uv run python -m compileall src tests
