name: Deploy to geeksaw

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mcp-robinhood-geeksaw-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    env:
      GEEKSAW_HOST: 100.118.74.32

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Join Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:github-actions

      - name: Wait for SSH reachability
        run: |
          for i in 1 2 3 4 5; do
            if timeout 5 bash -c ":</dev/tcp/$GEEKSAW_HOST/22"; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GEEKSAW_DEPLOY_KEY }}" > ~/.ssh/geeksaw_deploy
          chmod 600 ~/.ssh/geeksaw_deploy
          for i in 1 2 3 4 5; do
            ssh-keyscan -T 5 "$GEEKSAW_HOST" >> ~/.ssh/known_hosts && break
            sleep 2
          done
          test -s ~/.ssh/known_hosts

      - name: Prepare target
        run: |
          ssh -i ~/.ssh/geeksaw_deploy kingpin@"$GEEKSAW_HOST" '
            set -euo pipefail
            sudo install -d -o kingpin -g kingpin -m 0755 /opt/mcp-robinhood
            test -f /opt/mcp-robinhood/.env
          '

      - name: Sync source to geeksaw
        run: |
          rsync -az --delete \
            --rsync-path="sudo rsync" \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='logs/' \
            -e "ssh -i ~/.ssh/geeksaw_deploy" \
            ./ kingpin@"$GEEKSAW_HOST":/opt/mcp-robinhood/
          ssh -i ~/.ssh/geeksaw_deploy kingpin@"$GEEKSAW_HOST" '
            set -euo pipefail
            sudo chown -R kingpin:kingpin /opt/mcp-robinhood
          '

      - name: Rebuild and restart container
        run: |
          ssh -i ~/.ssh/geeksaw_deploy kingpin@"$GEEKSAW_HOST" '
            set -euo pipefail
            cd /opt/mcp-robinhood
            sudo podman compose down
            sudo podman compose up -d --build
            sudo podman ps --filter name=mcp-robinhood --format "{{.Names}} {{.Status}} {{.Ports}}"
            sudo ss -tlnp | grep -q ":8081 "
          '
