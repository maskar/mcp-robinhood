services:
  mcp-robinhood:
    build: .
    image: mcp-robinhood:latest
    container_name: mcp-robinhood
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8080
      # VAULT_ADDR set in .env
    env_file:
      - .env
    volumes:
      - robinhood-tokens:/home/app/.tokens
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  robinhood-tokens:
